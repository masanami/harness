# denylist.conf
# 危険なコマンドパターンのdenyリスト設定ファイル
#
# 形式: PATTERN<TAB>MESSAGE
#   PATTERN: grep -E で評価される拡張正規表現
#            POSIX文字クラス [[:space:]] を使用（\s は非対応環境があるため）
#   MESSAGE: ブロック時に表示するメッセージ
#   区切り文字: タブ文字 (TAB)
#
# 書式ルール:
#   - "#" で始まる行はコメント
#   - 空行は無視
#   - パターンとメッセージはタブ文字で区切る
#   - 大文字小文字を区別しないパターンは先頭に [case-insensitive] を付ける

# ============================================================
# ファイルシステム破壊系
# ============================================================

# rm -rf / または rm -rf /* (ルートディレクトリ全体削除)
rm[[:space:]]+(-[a-zA-Z]*r[a-zA-Z]*f|--recursive[[:space:]]+--force|-[a-zA-Z]*f[a-zA-Z]*r)[[:space:]]+/[[:space:]]*$	rm -rf / は実行できません

# rm -rf /* (ルート直下の全ファイル削除)
rm[[:space:]]+(-[a-zA-Z]*r[a-zA-Z]*f|--recursive[[:space:]]+--force|-[a-zA-Z]*f[a-zA-Z]*r)[[:space:]]+/\*	rm -rf /* は実行できません

# rm -rf $HOME または rm -rf ~ (ホームディレクトリ全体削除)
rm[[:space:]]+(-[a-zA-Z]*r[a-zA-Z]*f|--recursive[[:space:]]+--force|-[a-zA-Z]*f[a-zA-Z]*r)[[:space:]]+(~|\$HOME|\/Users\/[^/[:space:]]+|\/home\/[^/[:space:]]+)[[:space:]]*$	rm -rf ホームディレクトリ は実行できません

# ============================================================
# Gitリポジトリ破壊系
# ============================================================

# git push --force to main/master (強制プッシュ)
git[[:space:]]+push[[:space:]]+.*--force.*[[:space:]]+(origin[[:space:]]+)?(main|master)([[:space:]]|$)	main/masterへのforce pushは実行できません

# git push --force-with-lease to main/master
git[[:space:]]+push[[:space:]]+.*--force-with-lease.*[[:space:]]+(origin[[:space:]]+)?(main|master)([[:space:]]|$)	main/masterへのforce-with-lease pushは実行できません

# git push -f to main/master (短縮形)
git[[:space:]]+push[[:space:]]+-f[[:space:]].*(origin[[:space:]]+)?(main|master)([[:space:]]|$)	main/masterへのforce push (-f) は実行できません

# git reset --hard origin/main または origin/master
git[[:space:]]+reset[[:space:]]+--hard[[:space:]]+origin/(main|master)	git reset --hard origin/main(master) は実行できません

# ============================================================
# データベース破壊系
# ============================================================

# DROP TABLE / DROP DATABASE (テーブル・データベース削除)
[case-insensitive]DROP[[:space:]]+(TABLE|DATABASE)	DROP TABLE/DATABASE は実行できません

# TRUNCATE TABLE (テーブルデータ全削除)
[case-insensitive]TRUNCATE[[:space:]]+TABLE	TRUNCATE TABLE は実行できません

# ============================================================
# システム・権限系
# ============================================================

# chmod 777 / (ルートディレクトリの権限変更)
chmod[[:space:]].*777[[:space:]]+/[[:space:]]*$	chmod 777 / は実行できません

# chown -R root / (ルートディレクトリのオーナー変更)
chown[[:space:]]+(-[a-zA-Z]*R[a-zA-Z]*|--recursive)[[:space:]]+root[[:space:]]+/[[:space:]]*$	chown -R root / は実行できません
