# default-deny.conf
# settings.json の permissions.deny に追加するデフォルトdenyコマンド
#
# 形式: Bash(コマンド:*) の形式で1行に1エントリ
# "#" で始まる行はコメント、空行は無視される
#
# init-project はこのファイルを読み込み、.claude/settings.json の
# permissions.deny に反映する。
# プロジェクト固有のルールを追加したい場合はこのファイルを直接編集する。

# ============================================================
# Git 破壊系
# ============================================================

Bash(git push --force:*)
Bash(git push -f:*)
Bash(git reset --hard:*)
Bash(git clean -f:*)
Bash(git branch -D:*)
Bash(git checkout -- .:*)
Bash(git restore .:*)

# ============================================================
# GitHub CLI 破壊系
# ============================================================

Bash(gh repo delete:*)
Bash(gh issue delete:*)
Bash(gh pr close:*)
Bash(gh api -X DELETE:*)
Bash(gh api --method DELETE:*)

# ============================================================
# ファイルシステム破壊系
# ============================================================

Bash(rm -rf:*)
Bash(rm -r:*)
Bash(rmdir:*)

# ============================================================
# システム・権限系
# ============================================================

Bash(chmod:*)
Bash(chown:*)

# ============================================================
# HTTP 破壊系
# ============================================================

Bash(curl -X DELETE:*)
Bash(curl -X PUT:*)

# ============================================================
# インフラ破壊系
# ============================================================

Bash(cdk destroy:*)
Bash(cdktf destroy:*)
Bash(terraform apply:*)
Bash(terraform destroy:*)
Bash(pulumi up:*)
Bash(pulumi destroy:*)
Bash(serverless deploy:*)
Bash(sls deploy:*)

# ============================================================
# コンテナ・Kubernetes 系
# ============================================================

Bash(kubectl apply:*)
Bash(kubectl delete:*)
Bash(docker push:*)
